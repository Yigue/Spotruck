[webservers]
spottruck-prod-1 ansible_host=XX.XX.XX.XX ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/spottruck_prod

[dbservers]
spottruck-db ansible_host=XX.XX.XX.XX ansible_user=ubuntu

[redis]
spottruck-redis ansible_host=XX.XX.XX.XX ansible_user=ubuntu

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_user=deploy

# Application variables
app_repository=https://github.com/YOUR_ORG/spottruck.git
app_branch=main
node_env=production
app_port=3001
app_url=https://spottruck.com
database_url=postgresql://user:password@db-host:5432/spottruck
redis_url=redis://redis-host:6379
jwt_secret=CHANGE_ME_IN_VAULT
mercadopago_access_token=YOUR_MERCADOPAGO_TOKEN
vite_api_url=https://api.spottruck.com
vite_ws_url=wss://api.spottruck.com
cors_origin=https://spottruck.com
use_docker_compose=true
run_migrations=true
