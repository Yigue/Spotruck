version: '3.9'

services:
  # --- Databases ---
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: spottruck
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: spottruck_dev_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d spottruck']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Backend ---
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://admin:spottruck_dev_pass@postgres:5432/spottruck
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:4000}
      # Credenciales privadas: definirlas en un .env junto a este archivo
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Spottruck <onboarding@resend.dev>}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src/backend:/app
      - /app/node_modules
    command: npm run dev

  # --- Frontend ---
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
    depends_on:
      - backend
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
