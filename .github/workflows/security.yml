name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0' # Weekly scan

env:
  REGISTRY: ghcr.io
  NODE_VERSION: '20'

jobs:
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend
          push: false
          load: true
          tags: spottruck-backend:scan

      - name: Build Frontend image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./src/frontend
          push: false
          load: true
          tags: spottruck-frontend:scan

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'spottruck-backend:scan'
          format: 'sarif'
          output: 'trivy-results-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'spottruck-frontend:scan'
          format: 'sarif'
          output: 'trivy-results-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-backend.sarif'

      - name: Upload Trivy results to GitHub Security tab (Frontend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-frontend.sarif'

  npm-audit-backend:
    name: NPM Audit (Backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Fail on HIGH/CRITICAL vulnerabilities
        run: |
          if npm audit --audit-level=high | grep -q "HIGH\|CRITICAL"; then
            echo "High or Critical vulnerabilities found!"
            exit 1
          fi

  npm-audit-frontend:
    name: NPM Audit (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Fail on HIGH/CRITICAL vulnerabilities
        run: |
          if npm audit --audit-level=high | grep -q "HIGH\|CRITICAL"; then
            echo "High or Critical vulnerabilities found!"
            exit 1
          fi

  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run OWASP Dependency Check
        run: |
          mkdir -p owasp-reports
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            owasp/dependency-check-action:latest \
            --project Spottruck \
            --format HTML \
            --out owasp-reports \
            --failOnCVSS 7 \
            --scan ./src

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: owasp-reports/dependency-check-report.html
          retention-days: 30
