          type: string
        originLat:
          type: number
        originLng:
          type: number
        destAddress:
          type: string
        destLat:
          type: number
        destLng:
          type: number
        cargoType:
          type: string
        cargoWeight:
          type: number
        scheduledDate:
          type: string
          format: date-time
        basePrice:
          type: number
        status:
          $ref: '#/components/schemas/TripStatus'
        notes:
          type: string
          nullable: true
        userId:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/User'
        auction:
          $ref: '#/components/schemas/Auction'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ---- Auction ----
    Auction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tripId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/AuctionType'
        status:
          $ref: '#/components/schemas/AuctionStatus'
        currentPrice:
          type: number
          description: Precio actual (en ARS)
        reservePrice:
          type: number
          nullable: true
          description: Precio mínimo de reserva (opcional)
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        extensionCount:
          type: integer
          default: 0
          description: Cantidad de extensiones por anti-sniping
        winnerId:
          type: string
          format: uuid
          nullable: true
        bidsCount:
          type: integer
          default: 0
        createdAt:
          type: string
          format: date-time

    Bid:
      type: object
      properties:
        id:
          type: string
          format: uuid
        auctionId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        amount:
          type: number
          description: Monto ofertado (menor = mejor en subasta inversa)
        createdAt:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id:
              type: string
            companyName:
              type: string
              nullable: true
            ratingAvg:
              type: number
              nullable: true

    # ---- Payment ----
    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tripId:
          type: string
          format: uuid
        driverId:
          type: string
          format: uuid
        amount:
          type: number
        platformFee:
          type: number
          description: Fee de plataforma (8% del amount)
        netAmount:
          type: number
          description: Monto neto para el conductor (amount - platformFee)
        status:
          $ref: '#/components/schemas/PaymentStatus'
        holdExpiresAt:
          type: string
          format: date-time
        releasedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ---- Rating ----
    CreateRatingRequest:
      type: object
      required: [tripId, toUserId, score]
      properties:
        tripId:
          type: string
          format: uuid
        toUserId:
          type: string
          format: uuid
        score:
