# openspec/config.yaml — Spottruck
# Generated by sdd-init (hybrid mode). Source of truth for SDD phase rules.

schema: spec-driven

# Concise project context (kept under 10 lines per convention).
context: |
  Project: Spottruck — reverse-auction SaaS for heavy-freight logistics in Argentina.
  Frontend: React 18 + Vite 5 + TypeScript 5.6 + Tailwind 3.4 + Leaflet + Zustand + Axios (src/frontend/).
  Backend: Node 20 + Express + TypeScript 5.6 + Prisma + PostgreSQL 15 + Redis 7 + ws WebSocket (src/backend/).
  Infra: Docker Compose (root) + Terraform in src/infrastructure/terraform/.
  Tests: Vitest + Testing Library (frontend unit), Playwright (e2e), Jest + Supertest (backend).
  Quality: ESLint 9 + Prettier 3 + TypeScript strict.
  Design source of truth: ./SPEC.md (colors, typography, motion) and ./docs/specs/01..06-*.md (domain specs).
  No root package.json — workspace lives under src/.

# Strict TDD: project has tests but does not enforce red-green-refactor; tests
# coexist with implementation. Keep tdd: false in rules.apply.
strict_tdd: false

# Testing capabilities snapshot (mirrors Engram topic sdd/spotruck/testing-capabilities).
testing:
  runner:
    frontend: vitest
    backend: jest
    e2e: playwright
  layers:
    unit: true
    integration: true        # supertest on backend, vitest + Testing Library on frontend
    e2e: true                # playwright
  coverage:
    available: true
    command_frontend: "npm run test:coverage --prefix src/frontend"
    command_backend: "npm run test:coverage --prefix src/backend"
  linter: "npm run lint --prefix src/frontend && npm run lint --prefix src/backend"
  type_check:
    frontend: "npx tsc -p src/frontend --noEmit"
    backend: "npx tsc -p src/backend --noEmit"
  formatter: "prettier --check ."

# Phase rules per the openspec-convention. Commands are pinned to the actual scripts.
rules:
  proposal:
    - Include a rollback plan for any change touching payments, auth, or tracking.
    - Reference the relevant spec in ./docs/specs/ (01..06) when the change extends an existing domain.
    - State the user-visible outcome and the affected roles (empresa / transportista / admin).
  specs:
    - Use Given/When/Then for every scenario.
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY) — never "should" in lowercase.
    - Keep requirements atomic: one SHALL per bullet; split mixed bullets.
    - Mirror the domain split in ./docs/specs/ (auth, trips, auctions, payments, ratings, tracking).
  design:
    - Include a sequence diagram for any request that crosses the WebSocket boundary.
    - Document any new architectural decision as an ADR under ./docs/architecture/.
    - State tradeoffs explicitly when choosing between Prisma raw, services layer, or repository.
  tasks:
    - Group by phase (setup → backend → frontend → infra → verify), use hierarchical numbering (1, 1.1, 1.2).
    - Each task must be completable in one focused session (<= 400 LOC diff).
    - Always pair a behavior change with at least one test in the same task.
  apply:
    - Follow existing code patterns: camelCase (JS/TS), snake_case (Prisma/DB), kebab-case (files).
    - Do not introduce new top-level dependencies without a justification line in the PR body.
    - Conventional Commits only: feat:, fix:, docs:, refactor:, test:, chore:.
    tdd: false
    test_command: "cd src/backend && npm test -- --silent && cd ../frontend && npm test -- --silent"
  verify:
    test_command: "cd src/backend && npm test -- --silent && cd ../frontend && npm test -- --silent"
    build_command: "cd src/frontend && npm run build && cd ../backend && npm run build"
    coverage_threshold: 0      # project has no enforced coverage gate yet (SPEC.md DoD says ">80%" aspirational)
  archive:
    - Warn before merging deltas that DROP requirements from ./docs/specs/*.
    - Move the change folder to openspec/changes/archive/YYYY-MM-DD-{change-name}/ on success.
    - Never edit or delete an archived change.
